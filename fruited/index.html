<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruited.ai — Uncensored AI Blog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <a href="https://fruited.ai" class="logo">🍇 Fruited.ai</a>
            <nav><a href="https://fruited.ai">Visit Fruited.ai →</a></nav>
        </div>
    </header>
    <main class="container">
        <div class="hero">
            <h1>Uncensored AI Blog</h1>
            <p>Practical guides, creative prompts, and AI freedom insights — all pointing to the uncensored AI experience at Fruited.ai</p>
            <a href="https://fruited.ai" class="cta-button">Try Uncensored AI Free →</a>
        </div>
        <div class="blog-grid" id="blogs"><p class="loading">Loading...</p></div>
    </main>
    <footer>
        <div class="container">
            <p>Built for AI freedom enthusiasts. <a href="https://fruited.ai">Visit Fruited.ai →</a></p>
        </div>
    </footer>
    <script>
    (async () => {
        try {
            const r = await fetch('../sitemap.xml');
            const text = await r.text();
            const urls = [...text.matchAll(/<loc>(.*?)<\/loc>/g)].map(m => m[1]);
            const blogs = urls.filter(u => u.includes('fruited/blog-')).reverse().slice(0, 12);
            const grid = document.getElementById('blogs');
            grid.innerHTML = blogs.length ? blogs.map(u => {
                const name = u.split('/').pop().replace('.html','').replace('fruited/blog-','');
                const title = name.replace(/-/g,' ').replace(/\w/g, l => l.toUpperCase());
                return `<a href="${u}" class="blog-card"><h3>${title}</h3></a>`;
            }).join('') : '<p>No articles yet.</p>';
        } catch(e) { document.getElementById('blogs').innerHTML = '<p>Error loading.</p>'; }
    })();
    </script>
</body>
</html>
