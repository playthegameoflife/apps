<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fruited.ai — Uncensored AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Fruited.ai</h1>
    <p>Uncensored AI — text, image, and video generation without filters.</p>
    <a href="https://fruited.ai" class="cta">Try Fruited.ai Free</a>
  </header>
  <main>
    <h2>Latest Articles</h2>
    <div id="blogs"><p>Loading...</p></div>
  </main>
  <script>
    fetch('../sitemap.xml').then(r=>r.text()).then(xml=>{
      const urls = [...xml.matchAll(/loc>(.*?)<\/loc/g)].map(m=>m[1]);
      const blogs = urls.filter(u=>u.includes('/fruited/blog-')).slice(0,10);
      document.getElementById('blogs').innerHTML = blogs.map(u=>
        '<div class="blog-card"><a href="'+u+'">'+u.split('/').pop().replace('.html','').replace(/-/g,' ')+'</a></div>'
      ).join('');
    });
  </script>
</body>
</html>
